name: Helm Package and Publish

on:
  push:
    branches:
      - main

jobs:
  package-helm-chart:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package
        run: |
          mkdir -p packaged
          for chart in ./; do
            helm package $chart -d packaged
      - name: Push
        run: |
          cd packaged
          for chart in ./; do
            helm push $chart oci://ghcr.io/${{ github.repository }}
